<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>İş Takip Sistemi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f8f9fa;
        }

        .header-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            margin: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #007bff;
            color: white;
        }

        .add-btn {
            background-color: #28a745;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
            margin-bottom: 15px;
        }

        .btn {
            padding: 5px 10px;
            border-radius: 3px;
            color: white;
            text-decoration: none;
            font-size: 0.9em;
            margin-right: 5px;
        }

        .detail-btn {
            background-color: #17a2b8;
        }

        .edit-btn {
            background-color: #ffc107;
            color: black;
        }

        .delete-btn {
            background-color: #dc3545;
        }

        .durum-badge {
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div th:if="${successMessage}"
        style="padding: 15px; margin-bottom: 20px; background-color: #d4edda; color: #155724; border-radius: 5px; border: 1px solid #c3e6cb;">
        [[${successMessage}]]
    </div>

    <div class="header-container">
        <h1>📋 İş Takip Listesi</h1>
    </div>

    <a th:href="@{/add}" class="add-btn">Yeni İş Ekle</a>

    <table>
        <thead>
            <tr>
                <th>İş Adı</th>
                <th>Başlama Tarihi</th>
                <th>Ücret</th>
                <th>Durum</th>
                <th>İşlemler</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="is : ${isler}">
                <td th:text="${is.isAdi}"></td>
                <td th:text="${#temporals.format(is.baslamaTarihi, 'dd/MM/yyyy')}"></td>
                <td th:text="${#numbers.formatDecimal(is.ucret, 1, 'DEFAULT', 2, 'DEFAULT')} + ' TL'"></td>
                <td th:text="${is.durum}"></td>
                <td>
                    <a th:href="@{/isler/{id}(id=${is.id})}" class="btn detail-btn">Detay</a>
                    <a th:href="@{/edit/{id}(id=${is.id})}" class="btn edit-btn">Düzenle</a>
                    <a th:href="@{/delete/{id}(id=${is.id})}" class="btn delete-btn"
                        onclick="return confirm('Silmek istediğine emin misin?')">Sil</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>

</html>
