<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <title>İş Takip Sistemi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="bg-body-tertiary">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-tasks me-2"></i>İş Takip Sistemi</a>
            <div class="d-flex">
                <form th:action="@{/logout}" method="post">
                    <button class="btn btn-outline-light btn-sm" type="submit"><i
                            class="fas fa-sign-out-alt me-1"></i>Güvenli Çıkış</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container">
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
            <i class="fas fa-check-circle me-1"></i> <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-header bg-dark border-bottom d-flex justify-content-between align-items-center py-3">
                <h4 class="mb-0 text-secondary"><i class="fas fa-list me-2"></i>İş Listesi</h4>
                <a th:href="@{/add}" class="btn btn-success"><i class="fas fa-plus me-1"></i>Yeni İş Ekle</a>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-striped align-middle mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>İş Adı</th>
                                <th>Başlama Tarihi</th>
                                <th>Ücret</th>
                                <th>Durum</th>
                                <th class="text-center">İşlemler</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="is : ${isler}">
                                <td class="fw-bold text-primary" th:text="${is.isAdi}"></td>
                                <td th:text="${#temporals.format(is.baslamaTarihi, 'dd/MM/yyyy')}"></td>
                                <td th:text="${#numbers.formatDecimal(is.ucret, 1, 'DEFAULT', 2, 'DEFAULT')} + ' TL'">
                                </td>
                                <td>
                                    <span class="badge"
                                        th:classappend="${is.durum == 'Yapılacak' ? 'bg-warning text-dark' : (is.durum == 'Bitti' ? 'bg-success' : 'bg-info')}"
                                        th:text="${is.durum}"></span>
                                </td>
                                <td class="text-center">
                                    <div class="btn-group" role="group">
                                        <a th:href="@{/isler/{id}(id=${is.id})}" class="btn btn-sm btn-outline-info"
                                            title="Detay"><i class="fas fa-eye"></i></a>
                                        <a th:href="@{/edit/{id}(id=${is.id})}" class="btn btn-sm btn-outline-primary"
                                            title="Düzenle"><i class="fas fa-edit"></i></a>
                                        <a th:href="@{/delete/{id}(id=${is.id})}" class="btn btn-sm btn-outline-danger"
                                            title="Sil"
                                            onclick="return confirm('Bu işi silmek istediğinize emin misiniz?')"><i
                                                class="fas fa-trash"></i></a>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(isler)}">
                                <td colspan="5" class="text-center text-muted py-4">Sistemde henüz kayıtlı bir iş
                                    bulunmuyor.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
