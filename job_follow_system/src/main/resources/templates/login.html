<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <title>Sisteme Giriş - İş Takip</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="bg-body-tertiary d-flex align-items-center" style="height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow border-0 rounded-lg mt-5">
                    <div class="card-header bg-dark border-bottom text-white text-center py-3">
                        <h3 class="font-weight-light my-2"><i class="fas fa-clipboard-check me-2"></i>İş Takip Sistemi
                        </h3>
                    </div>
                    <div class="card-body p-4">

                        <div th:if="${param.error}" class="alert alert-danger text-center shadow-sm" role="alert">
                            <i class="fas fa-exclamation-triangle me-1"></i> Kullanıcı adı veya şifre hatalı!
                        </div>
                        <div th:if="${param.logout}" class="alert alert-success text-center shadow-sm" role="alert">
                            <i class="fas fa-check-circle me-1"></i> Başarıyla çıkış yaptınız.
                        </div>

                        <form th:action="@{/login}" method="post">
                            <div class="form-floating mb-3">
                                <input class="form-control" id="username" type="text" name="username"
                                    placeholder="Kullanıcı Adı" required />
                                <label for="username">Kullanıcı Adı</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input class="form-control" id="password" type="password" name="password"
                                    placeholder="Şifre" required />
                                <label for="password">Şifre</label>
                            </div>
                            <div class="d-grid gap-2 mt-4">
                                <button class="btn btn-primary btn-lg" type="submit">Giriş Yap</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
