<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <title>Malzeme Düzenle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="bg-body-tertiary d-flex align-items-center" style="height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow border-0">
                    <div class="card-header bg-dark text-white d-flex align-items-center py-3">
                        <a th:href="@{/isler/{isId}(isId=${isId})}" class="btn btn-outline-light btn-sm me-3"><i
                                class="fa-solid fa-arrow-left"></i></a>
                        <h4 class="mb-0"><i class="fas fa-edit me-2"></i>Malzeme Düzenle</h4>
                    </div>
                    <div class="card-body p-4">

                        <form th:action="@{/isler/{isId}/malzeme/update/{mId}(isId=${isId}, mId=${malzeme.id})}"
                            th:object="${malzeme}" method="post">
                            <input type="hidden" th:field="*{id}">

                            <div class="mb-3">
                                <label class="form-label fw-bold text-muted">Malzeme Adı</label>
                                <input type="text" class="form-control form-control-lg" th:field="*{malzemeAdi}"
                                    required>
                            </div>

                            <div class="row mb-4">
                                <div class="col-md-4">
                                    <label class="form-label fw-bold text-muted">Adet</label>
                                    <input type="number" class="form-control form-control-lg" th:field="*{adet}" min="1"
                                        required>
                                </div>
                                <div class="col-md-8">
                                    <label class="form-label fw-bold text-muted">Birim Fiyat (TL)</label>

                                    <input type="text" id="gorselFiyat" class="form-control form-control-lg"
                                        placeholder="0,00" oninput="formatMoney(this, 'gercekFiyat')">

                                    <input type="hidden" id="gercekFiyat" th:field="*{birimFiyat}">
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100"><i
                                    class="fas fa-sync-alt me-2"></i>Güncelle</button>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function formatMoney(inputElement, hiddenElementId) {
            let sayi = inputElement.value.replace(/\D/g, '');
            if (sayi === '') {
                document.getElementById(hiddenElementId).value = '';
                inputElement.value = '';
                return;
            }
            let floatDeger = (parseFloat(sayi) / 100).toFixed(2);
            document.getElementById(hiddenElementId).value = floatDeger;
            inputElement.value = new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(floatDeger);
        }

        // Sayfa yüklendiğinde mevcut fiyatı formata çevirip ekrana basar
        window.onload = function () {
            let gercekFiyatElement = document.getElementById('gercekFiyat');
            if (gercekFiyatElement && gercekFiyatElement.value) {
                // 1. Veritabanından gelen değeri ondalıklı sayıya çevir (Örn: 200.0)
                let floatDeger = parseFloat(gercekFiyatElement.value);

                // 2. İşlenecek değeri kuruş cinsinden tam sayıya çevir (Örn: 200.0 * 100 = 20000)
                let islenecekDeger = Math.round(floatDeger * 100).toString();

                // 3. Ekrana bas ve formatla
                let gorselInput = document.getElementById('gorselFiyat');
                gorselInput.value = islenecekDeger;
                formatMoney(gorselInput, 'gercekFiyat');
            }
        };
    </script>
</body>

</html>
