<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <title>İş Detayı ve Malzemeler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Klasör görünümü için özel kare resim ayarı */
        .gallery-img {
            aspect-ratio: 1 / 1;
            object-fit: cover;
            width: 100%;
            transition: transform 0.2s ease;
            cursor: pointer;
            border-radius: 4px;
        }

        .gallery-img:hover {
            transform: scale(1.08);
            z-index: 10;
        }

        .gallery-item {
            background-color: #2b2f32;
            border: 1px solid #3d4145;
            padding: 4px;
        }
    </style>
</head>

<body class="bg-body-tertiary">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-tasks me-2"></i>İş Takip Sistemi</a>
            <a th:href="@{/}" class="btn btn-outline-light btn-sm"><i class="fas fa-house me-1"></i>Ana Sayfa</a>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card shadow-sm border-0 h-100">
                    <div
                        class="card-header bg-primary text-white py-3 d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="fas fa-info-circle me-2"></i>İş Özeti</h5>
                        <span class="badge bg-light text-dark fs-6" th:text="${is.durum}"></span>
                    </div>
                    <div class="card-body">
                        <h4 class="text-primary mb-3" th:text="${is.isAdi}"></h4>
                        <hr>
                        <p class="mb-2"><i class="fas fa-calendar-alt text-muted me-2"></i> <strong>Tarih:</strong>
                            <span th:text="${#temporals.format(is.baslamaTarihi, 'dd.MM.yyyy')}"></span>
                        </p>
                        <p class="mb-2"><i class="fas fa-lira-sign text-muted me-2"></i> <strong>Ücret:</strong> <span
                                class="text-success fw-bold"
                                th:text="${#numbers.formatDecimal(is.ucret, 1, 'POINT', 2, 'COMMA')} + ' TL'"></span>
                        </p>
                        <p class="mb-2 text-truncate" th:title="${is.adres}">
                            <i class="fas fa-map-marker-alt text-danger me-2"></i>
                            <strong>Adres:</strong> <span
                                th:text="${is.adres != null ? is.adres : 'Adres girilmemiş'}"></span>
                        </p>
                        <hr>
                        <a th:href="@{/edit/{id}(id=${is.id})}" class="btn btn-outline-primary w-100 mt-auto"><i
                                class="fas fa-edit me-1"></i>İşi Düzenle</a>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-secondary text-white py-3">
                        <h5 class="mb-0"><i class="fas fa-tools me-2"></i>Kullanılan Malzemeler</h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive" style="max-height: 300px; overflow-y: auto;">
                            <table class="table table-hover table-striped align-middle mb-0">
                                <thead class="table-dark sticky-top">
                                    <tr>
                                        <th>Malzeme Adı</th>
                                        <th class="text-center">Adet</th>
                                        <th class="text-end">Birim Fiyat</th>
                                        <th class="text-center">İşlemler</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="malzeme : ${is.malzemeler}">
                                        <td th:text="${malzeme.malzemeAdi}"></td>
                                        <td class="text-center" th:text="${malzeme.adet}"></td>
                                        <td class="text-end text-warning"
                                            th:text="${#numbers.formatDecimal(malzeme.birimFiyat, 1, 'POINT', 2, 'COMMA')} + ' TL'">
                                        </td>
                                        <td class="text-center">
                                            <a th:href="@{/isler/{isId}/malzeme/edit/{mId}(isId=${is.id}, mId=${malzeme.id})}"
                                                class="btn btn-sm btn-outline-info"><i class="fas fa-edit"></i></a>
                                            <a th:href="@{/isler/{isId}/malzeme/delete/{mId}(isId=${is.id}, mId=${malzeme.id})}"
                                                class="btn btn-sm btn-outline-danger"
                                                onclick="return confirm('Silmek istediğinize emin misiniz?')"><i
                                                    class="fas fa-trash"></i></a>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(is.malzemeler)}">
                                        <td colspan="4" class="text-center text-muted py-4">Henüz malzeme eklenmemiş.
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="card-footer bg-dark-subtle border-top py-3">
                        <form th:action="@{/isler/{id}/malzeme/add(id=${is.id})}" method="post"
                            class="row g-2 align-items-end">
                            <div class="col-md-5">
                                <input type="text" name="malzemeAdi" class="form-control form-control-sm"
                                    placeholder="Malzeme Adı" required>
                            </div>
                            <div class="col-md-2">
                                <input type="number" name="adet" min="1" class="form-control form-control-sm"
                                    placeholder="Adet" required>
                            </div>
                            <div class="col-md-3">
                                <input type="text" class="form-control form-control-sm" placeholder="Fiyat (0,00)"
                                    oninput="formatMoney(this, 'gizliFiyatEkle')">
                                <input type="hidden" name="birimFiyat" id="gizliFiyatEkle" required>
                            </div>
                            <div class="col-md-2">
                                <button type="submit" class="btn btn-success btn-sm w-100"><i
                                        class="fas fa-plus"></i></button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-12 mt-2">
                <div class="card mb-4 shadow-sm border-0">
                    <div class="card-header bg-dark text-white py-2">
                        <h6 class="mb-0 small"><i class="fas fa-camera me-2"></i>Yeni Fotoğraf Yükle</h6>
                    </div>
                    <div class="card-body py-3">
                        <form th:action="@{/isler/{id}/fotograf/ekle(id=${is.id})}" method="post"
                            enctype="multipart/form-data">
                            <div class="input-group input-group-sm">
                                <input type="file" name="dosyalar" class="form-control" multiple accept="image/*">
                                <button type="submit" class="btn btn-primary px-4">Yükle</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card shadow-sm border-0 overflow-hidden">
                    <div class="card-header bg-secondary text-white py-2">
                        <h5 class="mb-0 small"><i class="fas fa-images me-2"></i>İş Galerisi</h5>
                    </div>
                    <div class="card-body bg-dark-subtle">
                        <div class="row row-cols-3 row-cols-sm-4 row-cols-md-6 row-cols-lg-8 g-2">
                            <div class="col" th:each="foto : ${is.fotograflar}">
                                <div class="card gallery-item h-100 shadow-sm overflow-hidden">
                                    <a th:href="@{'/is-fotograflari/' + ${foto.dosyaAdi}}" target="_blank">
                                        <img th:src="@{'/is-fotograflari/' + ${foto.dosyaAdi}}" class="gallery-img"
                                            alt="İş Fotoğrafı">
                                    </a>
                                </div>
                            </div>
                            <div class="col-12 text-center py-5 w-100" th:if="${#lists.isEmpty(is.fotograflar)}">
                                <i class="fas fa-folder-open fa-3x text-muted mb-2"></i>
                                <p class="text-muted fst-italic m-0">Henüz fotoğraf eklenmemiş.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function formatMoney(inputElement, hiddenElementId) {
            let sayi = inputElement.value.replace(/\D/g, '');
            if (sayi === '') {
                document.getElementById(hiddenElementId).value = '';
                inputElement.value = '';
                return;
            }
            let floatDeger = (parseFloat(sayi) / 100).toFixed(2);
            document.getElementById(hiddenElementId).value = floatDeger;
            inputElement.value = new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(floatDeger);
        }
    </script>
</body>

</html>
