<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Yeni İş Ekle</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            display: flex;
            justify-content: center;
        }

        .form-container {
            width: 100%;
            max-width: 500px;
            padding: 25px;
            border: 1px solid #ccc;
            border-radius: 10px;
            background: white;
        }

        .header-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .home-icon {
            color: #333;
            font-size: 24px;
            text-decoration: none;
        }

        h1 {
            margin: 0;
            font-size: 1.5em;
            color: #28a745;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            background-color: #28a745;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="form-container">
        <div class="header-container">
            <a th:href="@{/}" class="home-icon"><i class="fa-solid fa-house"></i></a>
            <h1>Yeni İş Ekle</h1>
        </div>
        <form th:action="@{/add}" th:object="${is}" method="post">
            <label>İş Adı:</label>
            <input type="text" th:field="*{isAdi}" required>
            <label>Başlama Tarihi:</label>
            <input type="date" th:field="*{baslamaTarihi}" required>
            <label>Ücret (TL):</label>
            <input type="number" th:field="*{ucret}" step="0.01" required>
            <label>Durum:</label>
            <select th:field="*{durum}">
                <option value="Yapılacak">Yapılacak</option>
                <option value="Devam Ediyor">Devam Ediyor</option>
                <option value="Beklemede">Beklemede</option>
                <option value="Tamamlandı">Tamamlandı</option>
            </select>
            <button type="submit">İşi Kaydet</button>
        </form>
    </div>
</body>

</html>
