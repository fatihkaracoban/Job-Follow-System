<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <title>İş Düzenle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="bg-body-tertiary">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-tasks me-2"></i>İş Takip Sistemi</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-primary text-white py-3">
                        <h5 class="mb-0"><i class="fas fa-edit me-2"></i>İş Bilgilerini Güncelle</h5>
                    </div>
                    <div class="card-body p-4">

                        <form th:action="@{/update/{id}(id=${is.id})}" th:object="${is}" method="post">
                            <input type="hidden" th:field="*{id}">

                            <div class="mb-3">
                                <label class="form-label fw-bold">İşin Adı</label>
                                <input type="text" class="form-control" th:field="*{isAdi}">
                                <div class="text-danger mt-1 small" th:if="${#fields.hasErrors('isAdi')}"
                                    th:errors="*{isAdi}"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold"><i class="fas fa-map-marker-alt me-2"></i>İş
                                    Adresi</label>
                                <textarea class="form-control" th:field="*{adres}" rows="3"
                                    placeholder="İşin yapılacağı açık adres..."></textarea>
                            </div>

                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label class="form-label fw-bold">Başlama Tarihi</label>
                                    <input type="date" class="form-control" th:field="*{baslamaTarihi}">
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label fw-bold">Toplam Ücret (TL)</label>
                                    <input type="number" step="0.01" class="form-control" th:field="*{ucret}">
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label fw-bold">İş Durumu</label>
                                    <select class="form-select" th:field="*{durum}">
                                        <option value="Yapılacak">Yapılacak</option>
                                        <option value="Devam Ediyor">Devam Ediyor</option>
                                        <option value="Bitti">Bitti</option>
                                    </select>
                                </div>
                            </div>

                            <div class="d-flex justify-content-between mt-4">
                                <a th:href="@{/}" class="btn btn-secondary"><i
                                        class="fas fa-arrow-left me-1"></i>İptal</a>
                                <button type="submit" class="btn btn-primary"><i
                                        class="fas fa-save me-1"></i>Güncelle</button>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
